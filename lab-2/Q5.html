<!-- Design a webpage layout using CSS Grid. Create a grid-based structure that includes a header, sidebar, main content area, and footer. Use grid-template-rows, grid-template-columns, gap, grid-row, and grid-column properties to arrange the layout. Ensure the grid layout is clean, well-structured, and responsive. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Lab Work</title>
    <link rel="stylesheet" href="q5.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Website Header</h1>
        </header>

        <nav>
            <h3>Sidebar</h3>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </nav>

        <main>
            <h2>Main Content Area</h2>
            <p>This section uses <strong>grid-column: 2 / 4</strong> to span across two columns of the grid structure.</p>
            <p>The layout is controlled by the parent container using <strong>grid-template-rows</strong> and <strong>grid-template-columns</strong>.</p>
        </main>

        <footer>
            <p>Grid Layout Lab &copy; 2026</p>
        </footer>
    </div>

</body>
</html>
