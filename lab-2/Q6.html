<!-- Create a webpage that demonstrates advanced CSS features. Use pseudo-classes such as hover, focus, and active, and pseudo-elements such as before and after. Apply CSS transitions, transforms, and animations using keyframes. Use CSS variables to define common colors and apply media queries to make the webpage responsive for different screen sizes. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS Lab</title>
    <link rel="stylesheet" href="q6.css">
</head>
<body>

    <h1>Advanced CSS Lab</h1>

    <section>
        <h2>Interactions</h2>
        <button class="btn">Hover & Click Me</button>
        <p><input type="text" placeholder="Click to see :focus"></p>
    </section>

    <section>
        <h2>Pseudo-Elements</h2>
        <p class="quote">This is pseudo-elements</p>
    </section>

    <section>
        <h2>Animation & Transform</h2>
        <div class="box">Pulse</div>
        <p style="text-align:center;">This box uses Keyframes and Transforms.</p>
    </section>

</body>
</html>
