<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightbulb Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="room">
        <img id="bulb" src="https://www.w3schools.com/js/pic_bulboff.gif" alt="Light Bulb">
        
        <p>The light is: <span id="status">OFF</span></p>
        
        <button id="toggleBtn" onclick="toggleLight()">Turn ON</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
